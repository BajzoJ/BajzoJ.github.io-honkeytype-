<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>honkeytype</title>
    <link rel="icon" href="honkeyType_blede.png">
<link rel="stylesheet" href="honkeyType.css">
</head>
<body>
    <header>
        <img src="honkeyType_tmave.png" id="logo">
        <h1><strong id="honkey">Honkey</strong><strong id="type">Type</strong></h1>
    </header>
    <main>

        <div class="settings">
            <div id="mode">
                <button id="timeBtn">time</button>
                <button id="wordBtn">words</button>

            </div>
            <div id="extended"></div>
        <div id="lowerbody">
            <div class="container">
                <div id="testWiew">
                    <div class="word-container">
                        <div class="words" id="wordsDisplay"></div>
                        <textarea
                            id="typingInput"
                            rows="3"
                            class="hidden-input"
                            autocomplete="off"
                            autocorrect="off"
                            spellcheck="false"
                            placeholder="start typing..."

                        ></textarea>
                    </div>

                    
                    <div class="stats">
                        <div class="stat">
                            <div class="stat-value">60s</div>
                            <div class="stat-label">time</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value">0</div>
                            <div class="stat-label">wpm</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value">100%</div>
                            <div class="stat-label">accuracy</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="hint" id="hint">Start typing to begin the test</div>
        </div>
    </main>
<script src="honkeyType.js"></script>
</body>  
</html>
