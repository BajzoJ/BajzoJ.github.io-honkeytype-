<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>honkeytype</title>
    <link rel="stylesheet" href="honkeyType.css" />
  </head>
  <body>
    <header>
      <div class="header-left">
        <img src="HonkeyType_tmave_logo.png" id="logo" />
        <h1>Type</h1>
      </div>
      <button class="login-btn">sign in</button>
    </header>

    <main class="container">
      <div class="settings">
        <div id="mode">
          <button class="active" id="timeBtn">time</button>
          <button id="wordBtn">words</button>
        </div>
        <div id="extended"></div>
      </div>

      <div id="testView">
        <div class="word-container">
          <div class="words" id="wordsDisplay"></div>
          <textarea
            id="typingInput"
            rows="3"
            autocomplete="off"
            autocorrect="off"
            spellcheck="false"
          ></textarea>
        </div>

        <div class="stats">
          <div class="stat">
            <div class="stat-value" id="timeDisplay">60s</div>
            time
          </div>
          <div class="stat">
            <div class="stat-value" id="wpmDisplay">0</div>
            wpm
          </div>
          <div class="stat">
            <div class="stat-value" id="accuracyDisplay">100%</div>
            acc
          </div>
        </div>
        <div class="hint" id="hint">Start typing to begin the test</div>
      </div>

      <div id="resultsView" class="hidden">
        <h2>Test Complete</h2>
        <h1>WPM: <span id="finalWpm">0</span></h1>
        <p>accuracy: <span id="finalAccuracy">0%</span></p>
        <p>Raw WPM: <span id="finalRawWpm">0</span></p>
        <p>Chars: <span id="finalChars">0</span></p>
        <button onclick="restartTest()" class="restart-btn">
          Restart test
        </button>
      </div>
    </main>

    <script src="HonkeyType.js"></script>
  </body>
</html>
