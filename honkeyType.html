<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>honkeytype</title>
    <link rel="icon" href="pohonkyBlede_Type.png">
<link rel="stylesheet" href="honkeyType.css">
</head>
<body>
    <header>
        <img src="HonkeyType_tmave_logo.png" id="logo" class="Hitem">
        <h1 class="Hitem"><strong id="honkey">Honkey</strong><strong id="type">Type</strong></h1>
    </header>
    <main>

        <div class="settings">
            <div id="mode">
                <button class="modebtn" id="timeBtn">time</button>
                <button class="modebtn" id="wordBtn">words</button>

            </div>
            <div id="extended"></div>
        <div id="lowerbody">
            <div class="container">
                <div id="testView">
                    <div class="word-container">
                        <div class="words" id="wordsDisplay"></div>
                        <textarea
                            id="typingInput"
                            rows="3"
                            class="hidden-input"
                            autocomplete="off"
                            autocorrect="off"
                            spellcheck="false"
                            placeholder="start typing..."

                        ></textarea>
                    </div>

                    
                    <div class="stats">
                        <div class="stat">
                            <div class="stat-value" id="timeDisplay">60s</div>
                            <div class="stat-label">time</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value" id="wpmDisplay">0</div>
                            <div class="stat-label">wpm</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value" id="accuracyDisplay">100%</div>
                            <div class="stat-label">accuracy</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="hint" id="hint">Start typing to begin the test</div>
        </div>
        <div id="resultsView" class="results hidden">
            <h2>Test Complete</h2>
            <div class="results-card">
                <div class="results-main">
                    <div class="result-item">
                        <div class="result-label">WPM</div>
                        <div class="result-value" id="finalWpm">0</div>
                    </div>
                    <div class="result-item">
                        <div class="result-label">accuracy</div>
                        <div class="result-value" id="finalAccuracy">0%</div>
                    </div>
                    <div class="result-item">
                        <div class="result-label">Raw WPM</div>
                        <div class="result-value" id="finalRawWpm">0</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Characters</div>
                        <div class="detal-value" id="finalChars">0</div>
                    </div>
                </div>
            </div>
        </div>
    </main>
<script src="HonkeyType.js"></script>
</body>  
</html>
