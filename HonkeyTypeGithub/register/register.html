
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>honkeytype – register</title>
  <link rel="icon" href="../icons/HonkeyType_blede_logo.png" />
  <link rel="stylesheet" href="register.css" />
</head>

<body>
  <div class="page">

    <!-- HEADER -->
    <header> 
    <div class="header-left">
        <a href="../main/honkeyType.html">
            <img src="../icons/HonkeyType_tmave_logo.png" id="logo" />
            <h1><strong id="type">Type</strong></h1>
        </a>
    </div>
    </header>

    <!-- MAIN (PRÁZDNE) -->
    <main>
      <div class="auth-wrapper">
      
        <!-- REGISTER -->
        <div class="auth-box">
          <h2 class="auth-title">
            <img src="../icons/adduser.png" alt=""> register
          </h2>
        
          <input type="text" placeholder="username" />
          <input type="email" placeholder="email" />
          <input type="email" placeholder="verify email" />
          <input type="password" placeholder="password" />
          <input type="password" placeholder="verify password" />
        
          <button class="auth-btn">
             <span>↪</span> sign up
          </button>
        </div>
      
        <!-- LOGIN -->
        <div class="auth-box">
          <h2 class="auth-title">
            <img src="../icons/login.png" alt=""> login
          </h2>
        
          <div class="socials">
            <button><img src="../icons/google.png" alt=""></button>
            <button><img src="../icons/github.png" alt=""></button>
          </div>
        
          <div class="divider">or</div>
        
          <input type="email" placeholder="email" />
          <input type="password" placeholder="password" />
        
          <label class="remember">
            <input type="checkbox" checked />
            remember me
          </label>
        
          <button class="auth-btn">
            <span>↪</span> sign in
          </button>
        
          <a href="#" class="forgot">forgot password?</a>
        </div>
      
      </div>
    </main>


    <!-- FOOTER -->
    <footer>
      <div class="footer-left">
        <a href="#">support</a>
        <a href="#">github</a>
        <a href="#">discord</a>
      </div>

      <div class="footer-right">
        <span>v1.0</span>
      </div>
    </footer>

  </div>
  <script src="register.js"></script>
</body>
</html>
