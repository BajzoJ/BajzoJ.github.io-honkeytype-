<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>honkeytype – register</title>
  <link rel="icon" href="../icons/HonkeyType_blede_logo.png" />
  <link rel="stylesheet" id="regStyle" href="register.css" />
  <script src="../themes.js"></script>
</head>

<body>
  <div class="page">

    <header> 
      <div class="header-left">
        <a href="../main/index.html">
          <img src="../icons/HonkeyType_tmave_logo.png" id="logo" />
          <h1><strong id="type">Type</strong></h1>
        </a>
      </div>
    </header>

    <main>
      <div class="auth-wrapper">
      
        <!-- REGISTER -->
        <div class="auth-box">
          <h2 class="auth-title">
            <img src="../icons/adduser.png" alt="" class="icon"> register
          </h2>
          <input id="reg-username" type="text" placeholder="username" />
          <input id="reg-password" type="password" placeholder="password" />
          <input id="reg-password-verify" type="password" placeholder="verify password" />
          <button class="auth-btn" id="reg-btn">
            <span>↪</span> sign up
          </button>
        </div>
      
        <!-- LOGIN -->
        <div class="auth-box">
          <h2 class="auth-title">
            <img src="../icons/login.png" alt="" class="icon"> login
          </h2>
          <div class="socials">
            <button><img src="../icons/google.png" alt="" class="icon"></button>
            <button><img src="../icons/github.png" alt="" class="icon"></button>
          </div>
          <div class="divider">or</div>
          <input id="login-username" type="text" placeholder="username" />
          <input id="login-password" type="password" placeholder="password" />
          <label class="remember">
            <input type="checkbox" checked id="checkBox" />
            remember me
          </label>
          <button class="auth-btn" id="login-btn">
            <span>↪</span> sign in
          </button>
          <a href="#" class="forgot">forgot password?</a>
        </div>
      
      </div>
    </main>

    <footer>
      <div class="footer-left">
        <a href="#">support</a>
        <a href="#">github</a>
        <a href="#">discord</a>
      </div>
      <div class="footer-right">
        <span>v1.0</span>
      </div>
    </footer>

  </div>
  <script src="register.js"></script>
</body>
</html>
